<!doctype html>
<html lang="pt-BR">
	<head>
		<meta charset="UTF-8" />
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1.0"
		/>
		<title>Aventura no Mapa</title>
		<link rel="stylesheet" href="../assets/css/tela_jogo.css" />
	</head>
	<body>
		<div class="game-container">
			<img
				src="../assets/images/MAPA.png"
				alt="Mapa de Aventura"
				class="game-bg"
			/>

			<div class="ui-layer">
				<button class="btn btn-back">Voltar ao Início</button>

				<div class="right-controls">
					<button class="btn btn-hint">
						💡 Dica
						<span class="hint-cost">(-5 pts)</span>
					</button>

					<div class="score-display">
						Pontos: <span>100</span>
					</div>
				</div>
			</div>
		</div>
	</body>
</html>
